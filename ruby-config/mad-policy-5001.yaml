    var isNotNull = function(value) { return (value != null && value != undefined); }; var applyRounding = function(value, roundingStrategy) { var valueInDollars = value / 100; if (!isNotNull(roundingStrategy) || roundingStrategy == 'NEAR') { return Math.round(valueInDollars) * 100; } else if (roundingStrategy == 'ROUNDUP') { return Math.ceil(valueInDollars) * 100; } else if (roundingStrategy == 'ROUNDDOWN') { return Math.floor(valueInDollars) * 100; } else { return Math.round(valueInDollars) * 100; } }; function computeMad(args, applicableMadProgram) { var getModelParam = function(paramName) { if (isNotNull(args.modelparameters)) { var modelParam = args.modelparameters[paramName]; return isNotNull(modelParam) ? modelParam : null; } else { return null; } }; var getUnpaidLateFeesFromPreviousBillingPeriod = function(lateFeeBilledActiveCoupons, previousBillingSummary) { var unpaidLateFeesFromPreviousBillingPeriod = 0; if (isNotNull(previousBillingSummary)) { var previousBillingStartMillis = previousBillingSummary['periodStartDate']; var previousBillingEndMillis = previousBillingSummary['periodEndDate']; for (var index in lateFeeBilledActiveCoupons) { var coupon = lateFeeBilledActiveCoupons[index]; if (coupon.rootCoupon.bookTime >= previousBillingStartMillis && coupon.rootCoupon.bookTime <= previousBillingEndMillis) { unpaidLateFeesFromPreviousBillingPeriod += coupon.value; } } } return unpaidLateFeesFromPreviousBillingPeriod; }; var getMinimumCurrMAD = function() { var currDueThreshold = getModelParam('currentDueThreshold'); return isNotNull(currDueThreshold) ? currDueThreshold : 3500; }; var getMinimumTotalMAD = function() { var totalMinDueThreshold = getModelParam('minimumAmountDueThreshold'); return isNotNull(totalMinDueThreshold) ? totalMinDueThreshold : 0; }; var getMADComponentsForCategories = function(madComponentsOverride) { var madComponentsWithAttrbution = {}; for (var postingCategory in madComponentsOverride) { if (isNotNull(args.postingcategories[postingCategory])) { madComponentsWithAttrbution[postingCategory] = madComponentsOverride[postingCategory] * args.postingcategories[postingCategory]; } else { madComponentsWithAttrbution[postingCategory] = 0; } } return madComponentsWithAttrbution; }; var addMadComponentsToComputeCurrentMADExcludingUnbilledLateFee = function(madComponents) { var currMADFromCategories = 0; for (var madComponent in madComponents) { if(madComponent !== 'latefeeunbilled') { currMADFromCategories += madComponents[madComponent]; } } return currMADFromCategories; }; function computeCurrentMAD(args, madComponents, minMAD, unpaidLateFeesFromPreviousBillingPeriod, includeLateFees) { var currMADFromCategoriesExcludingUnbilledLateFee = addMadComponentsToComputeCurrentMADExcludingUnbilledLateFee(madComponents); var roundedCurrMad = applyRounding(currMADFromCategoriesExcludingUnbilledLateFee, getModelParam('roundingForCurrentDue')); var currMADConsideringMinMAD = Math.max(roundedCurrMad, minMAD); var finalCurrMAD = currMADConsideringMinMAD + Math.min(Math.max(madComponents['latefeeunbilled'] - unpaidLateFeesFromPreviousBillingPeriod, 0), 4000); if (includeLateFees) { var roundedCurrMADFromCategories = applyRounding( currMADFromCategoriesExcludingUnbilledLateFee + madComponents['latefeeunbilled'], getModelParam('roundingForCurrentDue')); currMADConsideringMinMAD = Math.max(roundedCurrMADFromCategories, minMAD); finalCurrMAD = currMADConsideringMinMAD; } if (args.currentbalance < 0 || finalCurrMAD < 0) { finalCurrMAD = 0; } return finalCurrMAD; } var madComponents = getMADComponentsForCategories(applicableMadProgram.madComponentsOverride); var previousminimumamountdue = 1 * (args.postingcategories.minimumamountdue); var minMAD = applicableMadProgram.flags['minMADApplicable'] ? getMinimumCurrMAD() : 0; var unpaidLateFeesFromPreviousBillingPeriod = !applicableMadProgram.flags['skipLateFeeHandlingForPrevCycle'] ? getUnpaidLateFeesFromPreviousBillingPeriod(args.activecouponspercategory['latefeebilled'], args.pre