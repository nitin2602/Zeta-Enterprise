': 0.05 }; var scraProgramFlags = JSON.parse(JSON.stringify(defaultFlags)); scraProgramFlags['includeLateFeesInCurrMAD'] = true; scraProgramFlags['skipLateFeeHandlingForPrevCycle'] = true; scraProgramFlags['minMADApplicable'] = false; var scraProgramMadComponentsOverride = JSON.parse(JSON.stringify(postingCategoryMadComponentsDefaultAttribution)); scraProgramMadComponentsOverride['latefeeunbilled'] = 0.05; var scraMadProgram = { precedence: 100, selectionCriteria: { tags: [ { type: 'SCRAStatus', value: 'LEVEL_1', }, ], }, flags: scraProgramFlags, madComponentsOverride: scraProgramMadComponentsOverride }; var defaultProgram = {precedence: 1, selectionCriteria: null, flags: defaultFlags, madComponentsOverride: postingCategoryMadComponentsDefaultAttribution}; var madPrograms = []; madPrograms.push(scraMadProgram, defaultProgram); madPrograms.sort(function(a,b) { return b.precedence - a.precedence}); var getApplicableMadProgram = function() { if (!args.ledgerinfo) { return defaultProgram; } for (var i = 0; i < madPrograms.length; i++) { var program = madPrograms[i]; if(program.selectionCriteria == null) { return program; } for (var j = 0; j < program.selectionCriteria.tags.length; j++) { var programTag = program.selectionCriteria.tags[j]; for (var k = 0; k < args.ledgerinfo.tags.length; k++) { var ledgerTag = args.ledgerinfo.tags[k]; if (programTag.type === ledgerTag.type && programTag.value === ledgerTag.value && (ledgerTag.attributes['expiryDate'] == null || ledgerTag.attributes['expiryDate'] > args.billingdate)) { return program; } } } } return defaultProgram; }; var applicableMadProgram = getApplicableMadProgram(); return computeMad(args, applicableMadProgram); }
