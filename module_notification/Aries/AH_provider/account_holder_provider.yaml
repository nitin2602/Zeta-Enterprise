kind: AccountHolderProvider
apiVersion: rrsd.zetaapps.in/v1alpha1
metadata:
  name: lsg.tdr.accountholderprovider.module.default
  labels:
    rrsd.zetaapps.in/day: day-zero
  namespace: aries
  annotations:
    zeta.tech/resource-tags: '{"gitDbRepo":"tenant_configuration.aws-default-pp-mumbai.lsg","gitDbPath":"https://gitea.internal.mum1-pp.zetaapps.in/zetaengg/tenant_configuration.aws-default-pp-mumbai.lsg.git","filePath":"module_configurations/module_aries/AccountHolderProvider/account-holder-provider_default.yaml","tenantCode":"lsg"}'
spec:
  metadata:
    id: tdr.accountholderprovider.module.default
    name: Ezz x ZPay Account Holder Provider
    description: Default Account Holder Provider — Ezz x ZPay India
    tenantId: "600309"
    tenantCode: lsg
  code: AHP100001
  name: Ezz x ZPay Default Account Holder Provider
  state: ENABLED
  schema:
    description: Account Holder schema for Ezz x ZPay Credit Card Program — India
    attributes: "{}"
    content: '
      {
      "type": "object",
      "title": "Ezz x ZPay Account Holder Schema",
      "required": ["requestID","ifiID","accountHolderProviderID","type","firstName","lastName","dob","pointsOfPresence"],
      "allOf": [
      {
      "if": { "properties": { "type": { "enum": ["REAL"] } } },
      "then": {
      "properties": {
      "vectors": {
      "type": "array",
      "items": {
      "required": ["type","value"],
      "properties": {
      "ifiID":           { "type": "integer" },
      "value":           { "type": "string" },
      "status":          { "enum": ["ENABLED","DISABLED","DELETED","BLOCKED"], "type": "string" },
      "verified":        { "type": "boolean", "default": false },
      "accountHolderID": { "type": "string" }
      }
      }
      }
      }
      }
      }
      ],
      "properties": {
      "requestID":              { "type": "string" },
      "ifiID":                  { "type": "integer" },
      "accountHolderProviderID":{ "type": "string" },
      "type":                   { "type": "string", "enum": ["REAL"] },
      "firstName":              { "type": "string" },
      "middleName":             { "type": "string" },
      "lastName":               { "type": "string" },
      "dob":                    { "type": "string", "examples": ["15-Aug-1995"] },
      "gender":                 { "type": "string", "enum": ["MALE","FEMALE","OTHER","PREFER_NOT_TO_SAY"] },
      "isMinor":                { "type": "boolean", "default": false },
      "status":                 { "type": "string", "enum": ["ENABLED","DISABLED","DELETED"], "default": "ENABLED" },
      "id":                     { "type": "string" },
      "mothersMaidenName":      { "type": "string" },
      "nationality":            { "type": "string", "enum": ["IN"] },
      "vectors": {
      "type": "array",
      "default": [],
      "items": {
      "allOf": [
      {
      "type": "object",
      "properties": {
      "type":       { "enum": ["PAN","AADHAAR","MOBILE","code"], "type": "string" },
      "value":      { "type": "string" },
      "status":     { "enum": ["ENABLED","DISABLED","DELETED","BLOCKED"], "type": "string" },
      "verified":   { "type": "boolean", "default": false },
      "attributes": { "type": "object", "default": {} }
      }
      }
      ],
      "oneOf": [
      {
      "required": ["value"],
      "properties": {
      "type":  { "const": "PAN" },
      "value": { "type": "string", "pattern": "^[A-Z]{5}[0-9]{4}[A-Z]{1}$" }
      }
      },
      {
      "required": ["value"],
      "properties": {
      "type":  { "const": "AADHAAR" },
      "value": { "type": "string", "pattern": "^[X]{8}[0-9]{4}$" }
      }
      },
      {
      "required": ["value"],
      "properties": {
      "type":  { "const": "MOBILE" },
      "value": { "type": "string", "pattern": "^\\+91([6-9]\\d{9})$" }
      }
      },
      {
      "required": ["value"],
      "properties": {
      "type":  { "const": "code" },
      "value": { "type": "string" }
      }
      }
      ]
      }
      },
      "tags": {
      "type": "array",
      "default": [],
      "items": {
      "anyOf": [
      {
      "type": "object",
      "properties": {
      "type": { "enum": ["DECEASED","BANKRUPTCY","NPA","FRAUD","DELINQUENT","CHARGE_OFF"] }
      }
      },
      {
      "type": "object",
      "required": ["type","value"],
      "properties": {
      "type":  { "enum": ["VIP","ISSUER_INSIDER","SUPERNOVA_ELIGIBLE","STAFF"] },
      "value": { "enum": ["Y","N"] }
      }
      }
      ]
      }
      },
      "KYCStatus": {
      "type": "object",
      "properties": {
      "kycStatus": { "enum": ["FULL","SHORT_FALL","V_KYC","CKYC","EXTERNAL"], "type": "string" },
      "createdBy":  { "type": "string" },
      "updatedBy":  { "type": "string" },
      "attributes": {
      "type": "object",
      "required": ["docIssuer","docValue","docType","docUrl","valid","validationDate","validationSource"],
      "properties": {
      "docType":          { "enum": ["KYC-TOKEN","CKYC-NUMBER","DIGILOCKER-URI","VKYC-REF"], "type": "string" },
      "docIssuer":        { "enum": ["UIDAI","NSDL","CERSAI","DIGILOCKER","VKYC_PROVIDER"], "type": "string" },
      "docValue":         { "type": "string" },
      "docUrl":           { "type": "string" },
      "valid":            { "type": "string" },
      "validationDate":   { "type": "string", "format": "date" },
      "validationSource": { "enum": ["UIDAI","NSDL","CERSAI","DIGILOCKER","VKYC_PROVIDER"], "type": "string" }
      }
      },
      "standardExpiryTime": { "type": "string" },
      "standardUpdateTime": { "type": "string" }
      }
      },
      "financialDetails": {
      "type": "object",
      "properties": {
      "incomeDetailsList": {
      "type": "array",
      "default": [],
      "items": {
      "properties": {
      "type":     { "enum": ["Annual","Monthly"], "type": "string" },
      "currency": { "enum": ["INR"], "type": "string" },
      "amount":   { "type": "number" }
      }
      }
      },
      "employmentType": { "enum": ["SALARIED","SELF_EMPLOYED","BUSINESS_OWNER","RETIRED","STUDENT","OTHER"], "type": "string" },
      "employerName":   { "type": "string" },
      "cibilScore":     { "type": "integer", "minimum": 300, "maximum": 900 }
      }
      },
      "attributes":    { "type": "object", "default": {}, "properties": {} },
      "dedupeDetails": {
      "type": "object",
      "default": {},
      "properties": {
      "alreadyExists":                   { "type": "boolean", "default": false },
      "isConflictInAccountHolderVector": { "type": "boolean", "default": false }
      }
      },
      "pointsOfPresence": {
      "type": "array",
      "default": [],
      "allOf": [
      {
      "contains": { "type": "object", "properties": { "isDefault": { "type": "boolean", "const": true } } },
      "minContains": 1,
      "maxContains": 1
      }
      ],
      "items": {
      "type": "object",
      "required": ["label","addresses","isDefault"],
      "properties": {
      "label":     { "enum": ["Communication","Alternate"], "type": "string" },
      "isDefault": { "type": "boolean" },
      "addresses": {
      "type": "array",
      "minItems": 1,
      "items": {
      "allOf": [
      {
      "type": "object",
      "required": ["type","value","isCommunicationAllowed"],
      "properties": {
      "type":                   { "enum": ["Postal","Email","Phone"], "type": "string" },
      "isCommunicationAllowed": { "type": "boolean" }
      }
      }
      ],
      "oneOf": [
      {
      "properties": {
      "type": { "const": "Postal" },
      "value": {
      "required": ["line1","city","state","country","postCode"],
      "additionalProperties": false,
      "properties": {
      "firstName": { "type": "string" },
      "lastName":  { "type": "string" },
      "line1":     { "type": "string", "minLength": 1 },
      "line2":     { "type": "string" },
      "line3":     { "type": "string" },
      "city":      { "type": "string", "minLength": 1 },
      "state":     { "type": "string", "enum": ["AP","AR","AS","BR","CG","GA","GJ","HR","HP","JH","KA","KL","MP","MH","MN","ML","MZ","NL","OD","PB","RJ","SK","TN","TS","TR","UP","UK","WB","AN","CH","DN","DD","DL","JK","LA","LD","PY"] },
      "country":   { "enum": ["IN"], "type": "string" },
      "postCode":  { "type": "string", "pattern": "^[1-9][0-9]{5}$" }
      }
      }
      }
      },
      {
      "properties": {
      "type":  { "const": "Email" },
      "value": { "type": "string", "format": "email" }
      }
      },
      {
      "properties": {
      "type":  { "const": "Phone" },
      "value": { "type": "string", "pattern": "^\\+91([6-9]\\d{9})$" }
      }
      }
      ]
      }
      }
      }
      }
      }
      }
      }'
