apiVersion: rrsd.zetaapps.in/v1alpha1
kind: TransactionPolicy
metadata:
  name: bkezz.aura.transaction-policy.no-negative-balance-3003
  labels:
    rrsd.zetaapps.in/day: day-zero
  annotations:
    zeta.tech/resource-tags: '{"gitDbRepo":"tenant_configuration.aws-default-pp-mumbai.bkezz","gitDbPath":"https://gitea.internal.mum1-pp.zetaapps.in/zetaengg/tenant_configuration.aws-default-pp-mumbai.bkezz.git","filePath":"module_configurations/module_aura/transactions-policies/transaction-policy_no-negative-balance-3003.yaml","tenantCode":"bkezz"}'
spec:
  accountsApplicableTo:
    - account.provider: ruby
  coaCode: COAINBKEZZ001
  code: TPOIN003013003
  customRules:
    - action: META_DETAIL_CHANGE
      errorCode: NEGATIVE_BALANCE_NOT_ALLOWED
      evaluationFunction:
        type: JAVASCRIPT
        function: >
          function apply(policyContext) {
            var posting = policyContext.posting;
            var attributes = posting.attributes || {};
            var balanceBefore = attributes['super-card.balance-before'];
            var amount = posting.amount;
            var action = attributes['super-card.action'];
            if (balanceBefore === undefined || balanceBefore === null || !amount || !action) {
              return true;
            }
            balanceBefore = Number(balanceBefore);
            amount = Number(amount);
            if (isNaN(balanceBefore) || isNaN(amount)) {
              return true;
            }
            if (action !== 'DEBIT') {
              return true;
            }
            var balanceAfter = balanceBefore - amount;
            return balanceAfter >= 0;
          }
  description: Decline debit transactions that would result in negative balance
  effectiveFrom: "2024-01-01T00:00:00.000Z"
  errorCodes:
    - code: NEGATIVE_BALANCE_NOT_ALLOWED
      description: Debit would result in negative balance
      errorCode: NEGATIVE_BALANCE_NOT_ALLOWED
  expiresAt: "2999-12-31T00:00:00.000Z"
  metadata:
    description: Balance rule to prevent negative balance on Bank Ezz RuPay credit card
    id: aura.transaction-policy.no-negative-balance-3003
    name: no-negative-balance
    requester:
      module: aura-module
      moduleVersion: 0.0.1
    tenantCode: bkezz
    tenantId: "700001"
  policyScope: EACH_ACCOUNT_OF_ACCOUNT_HOLDER
  violationAction: DECLINE_AND_NOTIFY
  viewConfig:
    displayName: transaction-policy_no-negative-balance-3003.yaml
